const supa = {
  _session: null,
  async signUp(email, password) {
    const r = await fetch(`${SUPA_URL}/auth/v1/signup`, { method:"POST", headers:{"Content-Type":"application/json",apikey:SUPA_KEY}, body:JSON.stringify({email,password}) });
    return r.json();
  },
  async signIn(email, password) {
    const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, { method:"POST", headers:{"Content-Type":"application/json",apikey:SUPA_KEY}, body:JSON.stringify({email,password}) });
    const data = await r.json();
    if (data.access_token) { supa._session=data; localStorage.setItem("supa_session",JSON.stringify(data)); }
    return data;
  },
  async signOut() {
    const token = supa._session?.access_token;
    if (token) await fetch(`${SUPA_URL}/auth/v1/logout`, { method:"POST", headers:{apikey:SUPA_KEY,Authorization:`Bearer ${token}`} });
    supa._session=null; localStorage.removeItem("supa_session");
  },
  async refreshSession() {
    const saved = localStorage.getItem("supa_session");
    if (!saved) return null;
    const session = JSON.parse(saved);
    if (!session.refresh_token) return null;
    const now = Math.floor(Date.now() / 1000);
    const expiresAt = session.expires_at || 0;
    if (expiresAt - now > 300) { supa._session = session; return session; }
    try {
      const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=refresh_token`, { method:"POST", headers:{"Content-Type":"application/json",apikey:SUPA_KEY}, body:JSON.stringify({refresh_token:session.refresh_token}) });
      const data = await r.json();
      if (data.access_token) { supa._session=data; localStorage.setItem("supa_session",JSON.stringify(data)); return data; }
    } catch(e) { supa._session = session; return session; }
    localStorage.removeItem("supa_session"); return null;
  },
  startAutoRefresh() {
    setInterval(async () => {
      const saved = localStorage.getItem("supa_session");
      if (!saved || !supa._session) return;
      const session = JSON.parse(saved);
      if (!session.refresh_token) return;
      try {
        const r = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=refresh_token`, { method:"POST", headers:{"Content-Type":"application/json",apikey:SUPA_KEY}, body:JSON.stringify({refresh_token:session.refresh_token}) });
        const data = await r.json();
        if (data.access_token) { supa._session=data; localStorage.setItem("supa_session",JSON.stringify(data)); }
      } catch(e) {}
    }, 50 * 60 * 1000);
  },
  headers() { return {"Content-Type":"application/json",apikey:SUPA_KEY,Authorization:`Bearer ${supa._session?.access_token||SUPA_KEY}`,Prefer:"return=representation"}; },
  userId() { return supa._session?.user?.id; },

  async updateBook(id,book) { const r=await fetch(`${SUPA_URL}/rest/v1/books?id=eq.${id}&user_id=eq.${supa.userId()}`,{method:"PATCH",headers:supa.headers(),body:JSON.stringify(toRow(book))}); const d=await r.json(); return Array.isArray(d)?d[0]:d; },
  async deleteBook(id) { await fetch(`${SUPA_URL}/rest/v1/books?id=eq.${id}&user_id=eq.${supa.userId()}`,{method:"DELETE",headers:supa.headers()}); },

async function searchBooks(q) {
  // Google Books API — 무료, CORS 허용, 한국어 책도 잘 검색됨
  const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=10&langRestrict=ko&printType=books`);
  const j = await r.json();
  if (!j.items) return [];
  return j.items.map(item => {
    const info = item.volumeInfo || {};
    const cover = info.imageLinks?.thumbnail || info.imageLinks?.smallThumbnail || null;
    return {
      olId: item.id,
      title: info.title || "",
      author: (info.authors || []).join(", "),
      publisher: info.publisher || "",
      year: info.publishedDate ? info.publishedDate.slice(0,4) : "",
      cover: cover ? cover.replace("http://","https://") : null,
    };
  });
}

}
function Overlay({children}) {
  return <div style={{position:"fixed",inset:0,background:"rgba(60,40,50,0.28)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}>{children}</div>;

function CoverThumb({src}) {
  return <div style={{width:52,minWidth:52,height:74,borderRadius:4,background:C.pink,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>{src?<img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:20}}>📖</span>}</div>;

function SubHeader({title,onBack,right}) {

function TLItem({icon,label,date,sub,active}) {

        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>

        <div style={S.fLabel}>읽기 상태</div>

      </div>

function BackupView({books,vocab,onBack,userEmail}) {
  const [restoreFile,setRestoreFile]=useState(null);
  const [restoreMsg,setRestoreMsg]=useState("");
  const [copied,setCopied]=useState(false);
  const makeBackup=()=>JSON.stringify({version:1,exportedAt:new Date().toISOString(),userEmail,books,vocab},null,2);
  const downloadBackup=()=>{const blob=new Blob([makeBackup()],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`bookitory_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);};
  const mailBackup=()=>{const subject=encodeURIComponent(`[Bookitory] 독서 기록 백업 — ${new Date().toISOString().slice(0,10)}`);const body=encodeURIComponent(`아래 JSON을 복사해서 보관하세요.\n\n${makeBackup()}`);window.open(`mailto:${userEmail||""}?subject=${subject}&body=${body}`);};
  const copyBackup=async()=>{await navigator.clipboard.writeText(makeBackup());setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const handleRestore=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const parsed=JSON.parse(ev.target.result);if(!parsed.books||!parsed.vocab)throw new Error("형식 오류");setRestoreFile(parsed);setRestoreMsg(`📦 백업 파일 확인됨 — 책 ${parsed.books.length}권, 단어 ${parsed.vocab.length}개\n내보낸 날짜: ${parsed.exportedAt?.slice(0,10)||"알 수 없음"}`);}catch{setRestoreMsg("❌ 올바른 Bookitory 백업 파일이 아니에요.");setRestoreFile(null);}};reader.readAsText(file);};
  return (
    <main style={S.main}>
      <SubHeader title="데이터 백업 / 복구" onBack={onBack}/>
      <div style={{...S.noteCard,borderLeft:`3px solid ${C.accentText}`,marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:C.accentText,marginBottom:6}}>🔒 데이터 보안 안내</div>
        <div style={{fontSize:13,color:C.textMid,lineHeight:1.8}}>기록한 모든 데이터는 <b>본인 계정({userEmail})만</b> 접근할 수 있어요.<br/>Supabase Row Level Security로 보호되어 다른 사용자는 조회 불가해요.</div>
      </div>
      <div style={S.sectionPaper}>
        <div style={{...S.secTitle,marginBottom:12}}>📤 백업하기</div>
        <div style={{fontSize:13,color:C.textMid,marginBottom:16}}>현재 저장된 책 <b>{books.length}권</b>, 단어 <b>{vocab.length}개</b>를 백업해요.</div>
        <button style={S.backupBtn} onClick={downloadBackup}>⬇ JSON 파일로 다운로드</button>
        <button style={S.backupBtn} onClick={mailBackup}>✉ 메일 앱으로 전송하기</button>
        <button style={{...S.backupBtn,...(copied?{background:C.accentBg,color:C.accentText}:{})}} onClick={copyBackup}>{copied?"✓ 복사됨!":"📋 클립보드에 복사"}</button>
      </div>
      <div style={S.sectionPaper}>
        <div style={{...S.secTitle,marginBottom:12}}>📥 복구하기</div>
        <div style={{fontSize:13,color:C.textMid,marginBottom:16}}>이전에 다운로드한 <b>.json 백업 파일</b>을 선택해주세요.</div>
        <label style={S.fileLabel}>파일 선택하기<input type="file" accept=".json" style={{display:"none"}} onChange={handleRestore}/></label>
        {restoreMsg&&<div style={{marginTop:12,fontSize:13,color:C.textMid,whiteSpace:"pre-line",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:3,padding:"10px 14px"}}>{restoreMsg}</div>}
        {restoreFile&&<button style={{...S.backupBtn,marginTop:10,background:C.accent,color:C.accentText,border:`1.5px solid ${C.accentText}`,boxShadow:`2px 2px 0 ${C.accentText}`}} onClick={()=>alert("복구 기능은 추후 업데이트 예정이에요.\n지금은 백업 파일을 안전하게 보관해주세요.")}>이 파일로 복구하기</button>}
      </div>
    </main>
  );
}

function AuthScreen({onLogin}) {
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const submit=async()=>{if(!email||!pw){setErr("이메일과 비밀번호를 입력해주세요");return;}setLoading(true);setErr("");if(mode==="signup"){const data=await supa.signUp(email,pw);if(data.user)setDone(true);else setErr(data.msg||data.message||"회원가입 실패");}else{const data=await supa.signIn(email,pw);if(data.access_token)onLogin(data);else setErr(data.error_description||data.message||"로그인 실패");}setLoading(false);};
  if(done)return <div style={S.authWrap}><div style={S.authBox}><div style={{fontSize:40,marginBottom:12}}>📬</div><div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:8,fontFamily:F}}>이메일을 확인해주세요!</div><div style={{fontSize:14,color:C.textMid,marginBottom:20,lineHeight:1.7}}><b>{email}</b>로 인증 메일을 보냈어요.<br/>링크 클릭 후 로그인해주세요.</div><button style={S.pill} onClick={()=>{setDone(false);setMode("login");}}>로그인하러 가기</button></div></div>;
  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:22}}>
          <div className="brand-title" style={{fontSize:26,color:"#333",fontFamily:"'Pretendard Variable',Pretendard,sans-serif"}}>BOOKITORY</div>
          <div style={{fontSize:12,color:C.textSoft,marginTop:8,fontFamily:F}}>나만의 독서 기록 공간</div>
        </div>
        <div style={{display:"flex",background:C.bg,borderRadius:4,padding:3,marginBottom:20,gap:4,border:`1.5px solid ${C.border}`}}>
          {[["login","로그인"],["signup","회원가입"]].map(([k,l])=>(
            <button key={k} style={{flex:1,padding:"7px 0",borderRadius:3,border:"none",cursor:"pointer",fontFamily:F,fontSize:13,fontWeight:700,background:mode===k?C.surface:"transparent",color:mode===k?C.text:C.textSoft,boxShadow:mode===k?`1px 1px 0 ${C.border}`:"none"}} onClick={()=>{setMode(k);setErr("");}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12,textAlign:"left"}}>
          <div><div style={S.fLabel}>이메일</div><input style={S.inp} type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} autoFocus/></div>
          <div><div style={S.fLabel}>비밀번호{mode==="signup"&&<span style={{color:C.textSoft,fontWeight:400}}> (6자 이상)</span>}</div><input style={S.inp} type="password" placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/></div>
        </div>
        {err&&<div style={S.authErr}>{err}</div>}
        <button style={{...S.pill,width:"100%",padding:"13px",fontSize:15,marginTop:20}} onClick={submit} disabled={loading}>{loading?"처리 중...":mode==="login"?"로그인":"가입하기"}</button>
        <div style={{fontSize:12,color:C.textSoft,textAlign:"center",marginTop:16}}>PC·모바일 어디서든 같은 계정으로 동기화돼요 ☁️</div>
      </div>
    </div>
  );
}

function App() {
  const [session,setSession]=useState(null);
  const [books,setBooks]=useState([]);
  const [vocab,setVocab]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("home");
  const [selBook,setSelBook]=useState(null);
  const [filter,setFilter]=useState("all");
  const [addStep,setAddStep]=useState(1);
  const [searchQ,setSearchQ]=useState("");
  const [searchRes,setSearchRes]=useState([]);
  const [searching,setSrching]=useState(false);
  const [pending,setPending]=useState(null);
  const [noteModal,setNoteModal]=useState(false);
  const [editNote,setEditNote]=useState(null);
  const [vocabModal,setVocabModal]=useState(false);
  const [editVocab,setEditVocab]=useState(null);
  const timer=useRef(null);

  useEffect(()=>{(async()=>{const sess=await supa.refreshSession();setSession(sess||false);setLoading(false);if(sess)supa.startAutoRefresh();})();},[]);
  useEffect(()=>{if(session)loadAll();},[session]);
  async function loadAll(){setLoading(true);const[bRows,vRows]=await Promise.all([supa.getBooks(),supa.getVocab()]);setBooks((bRows||[]).map(fromRow));setVocab((vRows||[]).map(fromVocabRow));setLoading(false);}

  const handleSearch=q=>{setSearchQ(q);clearTimeout(timer.current);if(!q.trim()){setSearchRes([]);return;}timer.current=setTimeout(async()=>{setSrching(true);try{setSearchRes(await searchBooks(q));}catch{setSearchRes([]);}setSrching(false);},500);};
  const pickBook=b=>{setPending({...b,id:null,status:"reading",currentPage:"",totalPages:"",emotion:EMOTIONS[0],notes:[],startedAt:new Date().toISOString(),pageHistory:[],finishedAt:null,addedAt:new Date().toISOString()});setAddStep(2);};
  const confirmAdd=async()=>{if(!pending)return;const row=await supa.insertBook(pending);if(row?.id)setBooks(prev=>[fromRow(row),...prev]);setView("home");setAddStep(1);setSearchQ("");setSearchRes([]);setPending(null);};
  const saveNote=async note=>{const book=selBook;const updatedNotes=editNote?book.notes.map(n=>n.id===editNote.id?{...n,...note,editedAt:new Date().toISOString()}:n):[{...note,id:Date.now(),createdAt:new Date().toISOString()},...book.notes];const updated={...book,notes:updatedNotes};await supa.updateBook(book.id,updated);setBooks(prev=>prev.map(b=>b.id===book.id?updated:b));setSelBook(updated);setNoteModal(false);setEditNote(null);};
  const delNote=async id=>{const updated={...selBook,notes:selBook.notes.filter(n=>n.id!==id)};await supa.updateBook(selBook.id,updated);setBooks(prev=>prev.map(b=>b.id===selBook.id?updated:b));setSelBook(updated);};
  const updBook=async(id,upd)=>{const book=books.find(b=>b.id===id);const updated={...book,...upd};await supa.updateBook(id,updated);setBooks(prev=>prev.map(b=>b.id===id?updated:b));if(selBook?.id===id)setSelBook(updated);};
  const recordPage=async(id,page,total)=>{const book=books.find(b=>b.id===id);const entry={page,total,date:new Date().toISOString()};const isFinished=total&&Number(page)>=Number(total);const updated={...book,currentPage:page,totalPages:total,pageHistory:[...(book.pageHistory||[]),entry],...(isFinished&&book.status!=="done"?{status:"done",finishedAt:new Date().toISOString()}:{})};await supa.updateBook(id,updated);setBooks(prev=>prev.map(b=>b.id===id?updated:b));if(selBook?.id===id)setSelBook(updated);};
  const delBook=async id=>{await supa.deleteBook(id);setBooks(prev=>prev.filter(b=>b.id!==id));setView("home");setSelBook(null);};
  const saveVocab=async v=>{if(editVocab){const row=await supa.updateVocab(editVocab.id,v);setVocab(prev=>prev.map(w=>w.id===editVocab.id?fromVocabRow({...editVocab,...v,...(row||{})}):w));}else{const row=await supa.insertVocab(v);if(row?.id)setVocab(prev=>[fromVocabRow(row),...prev]);}setVocabModal(false);setEditVocab(null);};
  const delVocab=async id=>{await supa.deleteVocab(id);setVocab(prev=>prev.filter(w=>w.id!==id));};

  const goAdd=()=>{setView("add");setAddStep(1);setPending(null);setSearchQ("");setSearchRes([]);};
  const goDetail=b=>{setSelBook(b);setView("detail");};
  const goHome=()=>{setView("home");setSelBook(null);};
  const filtered=books.filter(b=>filter==="all"?true:filter==="reading"?b.status==="reading":b.status==="done");

  if(loading&&session===null)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg}}><div style={{textAlign:"center"}}><div className="brand-title" style={{fontSize:22,color:"#333",fontFamily:"'Pretendard Variable',Pretendard,sans-serif"}}>BOOKITORY</div><div style={{color:C.textMid,fontSize:14,marginTop:8,fontFamily:F}}>불러오는 중...</div></div></div>;
  if(!session)return <AuthScreen onLogin={sess=>{supa._session=sess;setSession(sess);}}/>;

  return (
    <div style={S.root}>
      <nav style={S.nav}>
        <button onClick={goHome} style={S.brand} className="brand-title">BOOKITORY</button>
        <div style={S.navR}>
          <button style={S.navLink} onClick={()=>setView("vocab")}>단어장</button>
          <button style={S.navLink} onClick={()=>setView("backup")}>백업</button>
          <button style={S.navLink} onClick={async()=>{await supa.signOut();setSession(false);setBooks([]);setVocab([]);setView("home");}}>로그아웃</button>
          <button style={S.pill} onClick={goAdd}>+ 책 추가</button>
        </div>
      </nav>

      {view==="home"&&<main style={S.main}><StatsBar books={books} vocab={vocab}/><div style={S.filterRow}>{[["all","전체"],["reading","읽는 중"],["done","완독"]].map(([k,l])=><button key={k} style={{...S.filterBtn,...(filter===k?S.filterActive:{})}} onClick={()=>setFilter(k)}>{l}</button>)}</div>{loading?<div style={{textAlign:"center",padding:"40px 0",color:C.textSoft}}>동기화 중...</div>:filtered.length===0?<div style={S.empty}><div style={{fontSize:44}}>📚</div><p style={{color:C.textMid,margin:0,fontFamily:F}}>아직 책이 없어요</p><button style={S.pill} onClick={goAdd}>첫 책 추가하기</button></div>:<div style={S.grid} className="book-grid">{filtered.map(b=><BookCard key={b.id} book={b} onClick={()=>goDetail(b)}/>)}</div>}</main>}

      {view==="detail"&&selBook&&<BookDetail book={selBook} onBack={goHome} onUpdate={updBook} onDel={delBook} onRecordPage={recordPage} onAddNote={()=>{setEditNote(null);setNoteModal(true);}} onEditNote={n=>{setEditNote(n);setNoteModal(true);}} onDelNote={delNote}/>}

      {view==="add"&&<main style={S.main}><SubHeader title="책 추가" onBack={goHome}/>{addStep===1&&<><div style={S.searchWrap}><span style={{color:C.textSoft}}>🔍</span><input style={S.searchInput} placeholder="제목이나 저자로 검색..." value={searchQ} onChange={e=>handleSearch(e.target.value)} autoFocus/></div>{searching&&<p style={S.hint}>검색 중...</p>}{searchRes.map((r,i)=><div key={i} style={S.resItem} className="hover-card" onClick={()=>pickBook(r)}><CoverThumb src={r.cover}/><div><div style={S.resTitle}>{r.title}</div><div style={S.resMeta}>{r.author}</div><div style={S.resMeta}>{[r.publisher,r.year&&r.year+"년"].filter(Boolean).join(" · ")}</div></div></div>)}{searchQ&&!searching&&<button style={{...S.ghost,marginTop:10}} onClick={()=>{setPending({title:searchQ,author:"",publisher:"",year:"",cover:null,status:"reading",currentPage:"",totalPages:"",emotion:EMOTIONS[0],notes:[],startedAt:new Date().toISOString(),pageHistory:[],finishedAt:null,addedAt:new Date().toISOString()});setAddStep(2);}}>✏️ 검색 결과가 없거나 맞지 않으면? 직접 입력하기</button>}</>}{addStep===2&&pending&&<AddForm book={pending} onChange={setPending} onBack={()=>setAddStep(1)} onConfirm={confirmAdd}/>}</main>}

      {view==="vocab"&&<main style={S.main}><SubHeader title="단어장" onBack={goHome} right={<button style={S.pill} onClick={()=>{setEditVocab(null);setVocabModal(true);}}>+ 추가</button>}/>{vocab.length===0?<div style={S.empty}><div style={{fontSize:44}}>📝</div><p style={{color:C.textMid,fontFamily:F}}>모르는 단어를 기록해보세요</p></div>:vocab.map(w=><div key={w.id} style={S.vocabCard}><div style={S.vocabWord}>{w.word}</div>{w.meaning&&<div style={S.vocabMeaning}>{w.meaning}</div>}{w.example&&<div style={S.vocabEx}>"{w.example}"</div>}{w.bookTitle&&<div style={S.vocabSrc}>📖 {w.bookTitle}</div>}<div style={S.row}><Chip onClick={()=>{setEditVocab(w);setVocabModal(true);}}>편집</Chip><Chip danger onClick={()=>delVocab(w.id)}>삭제</Chip></div></div>)}</main>}

      {view==="backup"&&<BackupView books={books} vocab={vocab} onBack={goHome} userEmail={session?.user?.email}/>}

      {noteModal&&<NoteModal initial={editNote} onSave={saveNote} onClose={()=>{setNoteModal(false);setEditNote(null);}}/>}
      {vocabModal&&<VocabModal initial={editVocab} books={books} onSave={saveVocab} onClose={()=>{setVocabModal(false);setEditVocab(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
